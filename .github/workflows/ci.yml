name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  native-tests:
    name: Native Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('software/NRG_itho_wifi/platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native tests
        working-directory: software/NRG_itho_wifi
        run: pio test -e native_test

  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('software/NRG_itho_wifi/platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build release firmware
        working-directory: software/NRG_itho_wifi
        run: pio run -e release

      - name: Report firmware size
        working-directory: software/NRG_itho_wifi
        run: |
          size_output=$(pio run -e release 2>&1 | grep -E "RAM:|Flash:" || echo "Size info not available")
          echo "### Firmware Size" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$size_output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
